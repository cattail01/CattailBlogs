# 端口号配置
server:
  port: 2441

# spring 配置
spring:

  # 数据源
  datasource:
    # region 基础数据源配置
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
    url: jdbc:mysql://localhost:3306/atguigudb?useUnicode=true&characterEncoding=utf8&useSSL=false
    type: com.alibaba.druid.pool.DruidDataSource
    # endregion 基础数据源配置
    # druid 连接池配置
    druid:
      # 配置监控防火墙
      filters: stat, wall, Slf4j
      # region 初始化大小、最小、最大
      initial-size: 5
      min-idle: 5
      max-active: 20
      # endregion 初始化大小、最小、最大
      test-while-idle: true
      # 获取连接等待超时的时间
      max-wait: 60000
      # 配置间隔多久需要进行检测关闭空闲连接
      time-between-eviction-runs-millis: 60000
      # 开启了statViewServlet功能,也就是监控页的配置
      stat-view-servlet:
        # 开启监控页
        enabled: true
        # 登录用户名
        login-username: root
        # 登录密码
        login-password: 123456
        # 禁用 html reset all按钮
        reset-enable: false
        url-pattern: /druid/**
        allow: 127.0.0.1, localhost
      # 监控web应用，开启web监控功能
      web-stat-filter:
        enabled: true
        url-pattern: /**
        exclusions: '*.js, *.gif, *.jpg, *.png, *.css, *.ico, /druid/*'
      filter:
        stat:
          enabled: true
          # 设置所有超过1000行的查询都是慢查询
          slow-sql-millis: 1000
          log-slow-sql: true
        wall:
          enabled: true
          config:
            drop-table-allow: false


# mybatis plus
mybatis-plus:
  configuration:
    # mysql 下划线命名转驼峰
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  # 定位mapper位置
  mapper-locations: classpath*:/mapper/**Mapper.xml
